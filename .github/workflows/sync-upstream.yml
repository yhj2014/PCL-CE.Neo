name: Auto Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 时间 0 点 = 北京时间上午 8 点
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream repo
        run: |
          git remote add upstream https://github.com/PCL-Community/PCL-CE.git
          git fetch upstream dev --depth=1   # 只拉取最新一次提交
          
          # 强制覆盖子文件夹
          git checkout upstream/dev -- PCL-CE/
          
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: sync upstream"
          git push
