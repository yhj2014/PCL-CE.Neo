name: Auto Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 时间 0 点 = 北京时间上午 8 点
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream repo
        run: |
          # 添加上游仓库
          git remote add upstream https://github.com/PCL-Community/PCL-CE.git
          
          # 拉取上游 dev 分支的最新代码（只取最新一次提交）
          git fetch upstream dev --depth=1
          
          # 创建目标文件夹（如果不存在）
          mkdir -p PCL-CE
          
          # 切换到 PCL-CE 目录
          cd PCL-CE
          
          # 从上游仓库提取所有文件到当前目录
          git checkout upstream/dev -- .
          
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: sync upstream"
          git push
