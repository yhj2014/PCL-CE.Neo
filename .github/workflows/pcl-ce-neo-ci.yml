name: PCL-CE.Neo Build (CI)

permissions:
  contents: read

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'PCL-CE.Neo*/**'
      - '.github/workflows/pcl-ce-neo-ci.yml'
  pull_request:
    paths:
      - 'PCL-CE.Neo*/**'
      - '.github/workflows/pcl-ce-neo-ci.yml'
  workflow_dispatch:

jobs:
  check-rules:
    name: Check Rules
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore Dependencies
        run: dotnet restore PCL-CE.Neo.Core.Abstractions/PCL-CE.Neo.Core.Abstractions.csproj

  build-core-abstractions:
    name: Build Core Abstractions
    runs-on: ubuntu-latest
    needs: check-rules
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build Core Abstractions
        run: |
          dotnet build PCL-CE.Neo.Core.Abstractions/PCL-CE.Neo.Core.Abstractions.csproj \
          -c Release --no-restore

  build-windows:
    name: Build Windows Platform
    runs-on: windows-latest
    needs: check-rules
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build Windows Platform
        run: |
          dotnet build "PCL-CE.Neo.Platform\Windows\PCL-CE.Neo.Platform.Windows.csproj" `
          -c Release --no-restore -p:DefineConstants="WINDOWS;$(DefineConstants)"

  build-macos:
    name: Build macOS Platform
    runs-on: macos-latest
    needs: check-rules
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build macOS Platform
        run: |
          dotnet build "PCL-CE.Neo.Platform/macOS/PCL-CE.Neo.Platform.macOS.csproj" \
          -c Release --no-restore -p:DefineConstants="MACOS;$(DefineConstants)"

  build-linux:
    name: Build Linux Platform
    runs-on: ubuntu-latest
    needs: check-rules
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build Linux Platform
        run: |
          dotnet build "PCL-CE.Neo.Platform/Linux/PCL-CE.Neo.Platform.Linux.csproj" \
          -c Release --no-restore -p:DefineConstants="LINUX;$(DefineConstants)"

  build-core:
    name: Build Core
    runs-on: ubuntu-latest
    needs: [build-core-abstractions, build-windows, build-macos, build-linux]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore Dependencies
        run: |
          dotnet restore PCL-CE.Neo.Core/PCL-CE.Neo.Core.csproj

      - name: Build Core
        run: |
          dotnet build PCL-CE.Neo.Core/PCL-CE.Neo.Core.csproj \
          -c Release --no-restore

  build-ui:
    name: Build UI
    runs-on: ubuntu-latest
    needs: [build-core-abstractions, build-windows, build-macos, build-linux]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore Dependencies
        run: |
          dotnet restore PCL-CE.Neo.UI/PCL-CE.Neo.UI.csproj

      - name: Build UI
        run: |
          dotnet build PCL-CE.Neo.UI/PCL-CE.Neo.UI.csproj \
          -c Release --no-restore

  build-tests:
    name: Build Tests
    runs-on: ubuntu-latest
    needs: [build-core, build-windows, build-macos, build-linux]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore Dependencies
        run: |
          dotnet restore PCL-CE.Neo.Tests/PCL-CE.Neo.Tests.csproj

      - name: Build Tests
        run: |
          dotnet build PCL-CE.Neo.Tests/PCL-CE.Neo.Tests.csproj \
          -c Release --no-restore

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build-tests
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run Tests
        run: |
          dotnet test PCL-CE.Neo.Tests/PCL-CE.Neo.Tests.csproj \
          -c Release --no-build --verbosity normal
