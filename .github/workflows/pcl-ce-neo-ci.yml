name: PCL-CE.Neo CI (Fast Build)

permissions:
  contents: read

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'PCL-CE.Neo*/**'
      - '*.slnx'
      - '.github/workflows/pcl-ce-neo-ci.yml'
  pull_request:
    paths:
      - 'PCL-CE.Neo*/**'
      - '*.slnx'
      - '.github/workflows/pcl-ce-neo-ci.yml'
  workflow_dispatch:

jobs:
  check-rules:
    name: Check Code Rules
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for RuntimeInformation.IsOSPlatform in Platform Services
        run: |
          echo "检查平台服务代码..."
          
          # Windows 平台服务检查
          WINDOWS_CHECK=$(grep -rn "RuntimeInformation.IsOSPlatform\|OperatingSystem.IsWindows" \
            PCL-CE.Neo.Platform/Windows/ --include="*.cs" || true)
          
          if [ -n "$WINDOWS_CHECK" ]; then
            echo "❌ 错误：在 Windows 平台服务中发现运行时平台检查！"
            echo "$WINDOWS_CHECK"
            exit 1
          fi
          
          # macOS 平台服务检查
          MACOS_CHECK=$(grep -rn "RuntimeInformation.IsOSPlatform\|OperatingSystem.IsMacOS\|OperatingSystem.IsMacCatalyst" \
            PCL-CE.Neo.Platform/macOS/ --include="*.cs" || true)
          
          if [ -n "$MACOS_CHECK" ]; then
            echo "❌ 错误：在 macOS 平台服务中发现运行时平台检查！"
            echo "$MACOS_CHECK"
            exit 1
          fi
          
          # Linux 平台服务检查
          LINUX_CHECK=$(grep -rn "RuntimeInformation.IsOSPlatform\|OperatingSystem.IsLinux" \
            PCL-CE.Neo.Platform/Linux/ --include="*.cs" || true)
          
          if [ -n "$LINUX_CHECK" ]; then
            echo "❌ 错误：在 Linux 平台服务中发现运行时平台检查！"
            echo "$LINUX_CHECK"
            exit 1
          fi
          
          echo "✅ 平台服务检查通过"

      - name: Check WindowsJavaScanner for Unix paths
        run: |
          echo "检查 WindowsJavaScanner..."
          
          WINDOWS_SCANNER_CHECK=$(grep -n "UnixJavaPaths" \
            PCL-CE.Neo.Platform/Windows/WindowsJavaScanner.cs || true)
          
          if [ -n "$WINDOWS_SCANNER_CHECK" ]; then
            echo "❌ 错误：在 WindowsJavaScanner 中发现 UnixJavaPaths！"
            echo "$WINDOWS_SCANNER_CHECK"
            exit 1
          fi
          
          echo "✅ WindowsJavaScanner 检查通过"

      - name: Check Project Files for Correct DefineConstants
        run: |
          echo "检查项目文件..."
          
          # 检查 Windows 项目
          WINDOWS_CSPROJ_CHECK=$(grep "<DefineConstants>" PCL-CE.Neo.Platform/Windows/PCL-CE.Neo.Platform.Windows.csproj)
          if ! echo "$WINDOWS_CSPROJ_CHECK" | grep -q "WINDOWS"; then
            echo "❌ 错误：Windows 项目文件中缺少 WINDOWS 条件编译符号！"
            exit 1
          fi
          
          # 检查 macOS 项目
          MACOS_CSPROJ_CHECK=$(grep "<DefineConstants>" PCL-CE.Neo.Platform/macOS/PCL-CE.Neo.Platform.macOS.csproj)
          if ! echo "$MACOS_CSPROJ_CHECK" | grep -q "MACOS"; then
            echo "❌ 错误：macOS 项目文件中缺少 MACOS 条件编译符号！"
            exit 1
          fi
          
          # 检查 Linux 项目
          LINUX_CSPROJ_CHECK=$(grep "<DefineConstants>" PCL-CE.Neo.Platform/Linux/PCL-CE.Neo.Platform.Linux.csproj)
          if ! echo "$LINUX_CSPROJ_CHECK" | grep -q "LINUX"; then
            echo "❌ 错误：Linux 项目文件中缺少 LINUX 条件编译符号！"
            exit 1
          fi
          
          echo "✅ 项目文件检查通过"

  build:
    name: Build Solution
    runs-on: ubuntu-latest
    needs: check-rules
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore Dependencies
        run: |
          dotnet restore PCL-CE.Neo.slnx

      - name: Build Solution
        run: |
          dotnet build PCL-CE.Neo.slnx -c Release --no-restore

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run Tests
        run: |
          dotnet test PCL-CE.Neo.slnx -c Release --no-build --verbosity normal
