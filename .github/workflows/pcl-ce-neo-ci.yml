name: PCL-CE.Neo CI (Fast Build)

permissions:
  contents: read

on:
  push:
    branches: [ '**' ]
    paths:
      - 'PCL-CE.Neo*/**'
      - '*.slnx'
      - '.github/workflows/pcl-ce-neo-ci.yml'
  pull_request:
    branches: [ '**' ]
    paths:
      - 'PCL-CE.Neo*/**'
      - '*.slnx'
      - '.github/workflows/pcl-ce-neo-ci.yml'
  workflow_dispatch:

jobs:
  check-rules:
    name: Check Code Rules
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for RuntimeInformation.IsOSPlatform in Platform Services
        run: |
          echo "检查平台服务代码..."

          # Windows 平台服务检查
          WINDOWS_CHECK=$(grep -rn "RuntimeInformation.IsOSPlatform\|OperatingSystem.IsWindows" \
            PCL-CE.Neo.Platform/Windows/ --include="*.cs" || true)

          if [ -n "$WINDOWS_CHECK" ]; then
            echo "❌ 错误：在 Windows 平台服务中发现运行时平台检查！"
            echo "$WINDOWS_CHECK"
            exit 1
          fi

          # macOS 平台服务检查
          MACOS_CHECK=$(grep -rn "RuntimeInformation.IsOSPlatform\|OperatingSystem.IsMacOS\|OperatingSystem.IsMacCatalyst" \
            PCL-CE.Neo.Platform/macOS/ --include="*.cs" || true)

          if [ -n "$MACOS_CHECK" ]; then
            echo "❌ 错误：在 macOS 平台服务中发现运行时平台检查！"
            echo "$MACOS_CHECK"
            exit 1
          fi

          # Linux 平台服务检查
          LINUX_CHECK=$(grep -rn "RuntimeInformation.IsOSPlatform\|OperatingSystem.IsLinux" \
            PCL-CE.Neo.Platform/Linux/ --include="*.cs" || true)

          if [ -n "$LINUX_CHECK" ]; then
            echo "❌ 错误：在 Linux 平台服务中发现运行时平台检查！"
            echo "$LINUX_CHECK"
            exit 1
          fi

          echo "✅ 平台服务检查通过"

      - name: Check WindowsJavaScanner for Unix paths
        run: |
          echo "检查 WindowsJavaScanner..."

          WINDOWS_SCANNER_CHECK=$(grep -n "UnixJavaPaths" \
            PCL-CE.Neo.Platform/Windows/WindowsJavaScanner.cs || true)

          if [ -n "$WINDOWS_SCANNER_CHECK" ]; then
            echo "❌ 错误：在 WindowsJavaScanner 中发现 UnixJavaPaths！"
            echo "$WINDOWS_SCANNER_CHECK"
            exit 1
          fi

          echo "✅ WindowsJavaScanner 检查通过"

  build-core:
    name: Build Core Projects
    runs-on: ubuntu-latest
    needs: check-rules

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore Core Projects
        run: |
          dotnet restore PCL-CE.Neo.Core.Abstractions/PCL-CE.Neo.Core.Abstractions.csproj
          dotnet restore PCL-CE.Neo.Core/PCL-CE.Neo.Core.csproj

      - name: Build Core Projects
        run: |
          dotnet build PCL-CE.Neo.Core.Abstractions/PCL-CE.Neo.Core.Abstractions.csproj -c Release --no-restore
          dotnet build PCL-CE.Neo.Core/PCL-CE.Neo.Core.csproj -c Release --no-restore

  build-platform-linux:
    name: Build Linux Projects
    runs-on: ubuntu-latest
    needs: build-core

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore Linux Projects
        run: |
          dotnet restore PCL-CE.Neo.Platform/Linux/PCL-CE.Neo.Platform.Linux.csproj
          dotnet restore PCL-CE.Neo.UI/PCL-CE.Neo.UI.csproj
          dotnet restore PCL-CE.Neo.App/PCL-CE.Neo.App.Linux.csproj

      - name: Build Linux Projects
        run: |
          dotnet build PCL-CE.Neo.Platform/Linux/PCL-CE.Neo.Platform.Linux.csproj -c Release --no-restore
          dotnet build PCL-CE.Neo.UI/PCL-CE.Neo.UI.csproj -c Release --no-restore
          dotnet build PCL-CE.Neo.App/PCL-CE.Neo.App.Linux.csproj -c Release --no-restore

  build-platform-windows:
    name: Build Windows Projects
    runs-on: windows-latest
    needs: build-core

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore Windows Projects
        run: |
          dotnet restore PCL-CE.Neo.Platform/Windows/PCL-CE.Neo.Platform.Windows.csproj
          dotnet restore PCL-CE.Neo.UI/PCL-CE.Neo.UI.csproj
          dotnet restore PCL-CE.Neo.App/PCL-CE.Neo.App.Windows.csproj

      - name: Build Windows Projects
        run: |
          dotnet build PCL-CE.Neo.Platform/Windows/PCL-CE.Neo.Platform.Windows.csproj -c Release --no-restore
          dotnet build PCL-CE.Neo.UI/PCL-CE.Neo.UI.csproj -c Release --no-restore
          dotnet build PCL-CE.Neo.App/PCL-CE.Neo.App.Windows.csproj -c Release --no-restore

  build-platform-macos:
    name: Build macOS Projects
    runs-on: macos-latest
    needs: build-core

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore macOS Projects
        run: |
          dotnet restore PCL-CE.Neo.Platform/macOS/PCL-CE.Neo.Platform.macOS.csproj
          dotnet restore PCL-CE.Neo.UI/PCL-CE.Neo.UI.csproj
          dotnet restore PCL-CE.Neo.App/PCL-CE.Neo.App.macOS.csproj

      - name: Build macOS Projects
        run: |
          dotnet build PCL-CE.Neo.Platform/macOS/PCL-CE.Neo.Platform.macOS.csproj -c Release --no-restore
          dotnet build PCL-CE.Neo.UI/PCL-CE.Neo.UI.csproj -c Release --no-restore
          dotnet build PCL-CE.Neo.App/PCL-CE.Neo.App.macOS.csproj -c Release --no-restore

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build-core

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run Tests
        run: |
          dotnet test PCL-CE.Neo.Tests/PCL-CE.Neo.Tests.csproj -c Release --verbosity normal
