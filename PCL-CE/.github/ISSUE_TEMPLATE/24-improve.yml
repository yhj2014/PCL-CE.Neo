name: "[新版] 优化建议"
description: "对新版 PCL CE 已有功能的小幅度优化或改进建议。"
title: "[C#]: "
type: "优化"
body:
- type: markdown
  id: "desc"
  attributes:
    value: |
      ## 感谢参与 PCL CE 新版本测试！
      请注意您目前正在提交和新版本有关的优化建议
      由于我们目前不受理针对旧版本的优化建议，如果您使用的不是新版本 (2.15.x)，
      您可以尝试更新到 2.15.x 版本 (Beta 渠道)，或是在晚一些 2.15.0 推送到正式版之后再来提交反馈
- type: checkboxes
  id: "yml-1"
  attributes:
    label: "检查项"
    description: "请逐个检查下列项目，并勾选确认。"
    options:
    - label: "我已在 [Issues 页面](https://github.com/PCL-Community/PCL2-CE/issues?q=is%3Aissue+) 中搜索，确认了这一建议未在社区版被提交过"
      required: true
    - label: "我确认只是全部选中而没有[仔细确认](https://github.com/PCL-Community/PCL2-CE/issues?q=is%3Aissue+)就直接提交了这个 Issue，并且同意这个 Issue 可以直接被关闭"
      required: false
    - label: "我确认我所描述的改进是现实的、有理有据的，而不是我临时起意的"
      required: true
    - label: "我已知悉社区不对这类 Issue 的完成时间作出任何保证，并有足够的耐心等待社区开发者的处理，同时已知悉如果我作出催促、质问或类似的举动，这个 Issue 可能会被直接关闭"
      required: true
- type: textarea
  id: "yml-2"
  attributes:
    label: 描述
    description: "详细描述具体需要优化哪些地方，要改成怎样的。"
  validations:
    required: true
- type: textarea
  id: "yml-3"
  attributes:
    label: 原因
    description: "详细描述你为什么需要这项优化，这有助于开发者评估它的优先度。"
    placeholder: |
      示例：
      这项优化让我可以更方便地 xxxx。
      如果没有这项优化，我每次都必须 xxxx，让操作变得很麻烦。
  validations:
    required: false
