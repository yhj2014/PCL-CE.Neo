name: "[新版] Minecraft 崩溃"
description: "新版 PCL CE 提示 “Minecraft 出现错误”，或游戏崩溃"
title: "[C#]: "
type: "崩溃"
body:
- type: markdown
  id: "desc"
  attributes:
    value: |
      ## 感谢参与 PCL CE 新版本测试！
      请注意您目前正在提交和新版本有关的 Minecraft 崩溃反馈
      如果您使用的不是新版本 (2.15.x)，请到 [旧版 Minecraft 崩溃反馈区](https://github.com/PCL-Community/PCL-CE/issues/new?template=2-game_crash.yml) 提交反馈
- type: checkboxes
  id: "yml-1"
  attributes:
    label: "检查项"
    description: "请逐个检查下列项目，并勾选确认。"
    options:
    - label: "**我已尝试使用 [HMCL](https://hmcl.huangyuhui.net/download) 启动，HMCL 没有出现问题**（如果 HMCL 也无法启动就一般不是 PCL CE 导致的问题，请 **不要** 提交反馈）"
      required: true
    - label: "我已在 [Issues 页面](https://github.com/PCL-Community/PCL2-CE/issues?q=is%3Aissue+) 中搜索，确认了这一 Bug 未被提交过"
      required: true
    - label: "我确认只是全部选中而没有[仔细确认](https://github.com/PCL-Community/PCL2-CE/issues?q=is%3Aissue+)就直接提交了这个 Issue，并且同意这个 Issue 可以直接被关闭"
      required: false
    - label: "我确认正在使用当前更新分支的最新版 PCL CE，若不是，此 Issue 可能会被直接关闭（更新方式：启动器 `设置-关于-软件更新` 检查更新，或在 [Releases](https://github.com/PCL-Community/PCL2-CE/releases) 页面下载）"
      required: true
    - label: "我确认会详细描述我所遇到的问题，并附上日志和截图，而不是随便填点东西敷衍了事。"
      required: true
- type: textarea
  id: "yml-2"
  attributes:
    label: 描述
    description: "详细描述具体表现。"
  validations:
    required: true
- type: textarea
  id: "yml-3"
  attributes:
    label: PCL CE 错误报告、日志与附件
    description: "上传 PCL CE 提供的错误报告 (在崩溃时选择导出错误报告)。如果没有，请在游戏崩溃后不要关掉启动器，使用 `设置-查看日志-导出日志` 得到日志压缩包并上传。"
    placeholder: |
      先点击这个文本框，然后再将文件直接拖拽到文本框中以上传。
      如果缺少相关错误报告或日志用于分析问题，此 Issue 可能会被直接关闭。
  validations:
    required: true
- type: textarea
  id: "yml-4"
  attributes:
    label: HMCL 启动脚本
    description: "在 HMCL 中进入实例列表，点击版本右侧的三个点，选择“生成启动脚本”。"
    placeholder: "先点击这个文本框，然后再将文件直接拖拽到文本框中以上传。"
  validations:
    required: false
